  :root{
    --bg:#0d0f14;--surface:#161b25;--card:#1e2535;--border:#2a3347;
    --text:#e8eaf0;--muted:#7a8299;--accent:#4f9cf9;--green:#3ecf8e;
    --red:#f75e5e;--amber:#f7c948;--purple:#a78bfa;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:0}
  #app{max-width:680px;margin:0 auto;padding:1.5rem 1rem}

  .header{text-align:center;margin-bottom:1.5rem}
  .logo{font-family:'Playfair Display',serif;font-size:2rem;color:var(--accent);letter-spacing:-1px}
  .subtitle{font-size:.85rem;color:var(--muted);margin-top:.25rem}

  .level-tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap}
  .tab{padding:.4rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.2s}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
  .tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1.5rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem;text-align:center}
  .stat-val{font-size:1.3rem;font-weight:500;color:var(--text)}
  .stat-label{font-size:.7rem;color:var(--muted);margin-top:.15rem}
  .stat-val.green{color:var(--green)}
  .stat-val.red{color:var(--red)}
  .stat-val.amber{color:var(--amber)}

  .quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
  .question-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
  .badge{font-size:.7rem;padding:.2rem .7rem;border-radius:999px;font-weight:500}
  .badge.kata-kerja{background:rgba(79,156,249,.15);color:var(--accent)}
  .badge.kata-sifat{background:rgba(167,139,250,.15);color:var(--purple)}
  .badge.kata-benda{background:rgba(62,207,142,.15);color:var(--green)}
  .q-num{font-size:.8rem;color:var(--muted)}

  .question{font-size:1.5rem;font-weight:500;text-align:center;padding:1.2rem 0 1rem;line-height:1.4;color:var(--text)}
  .question span.german{color:var(--accent);font-size:1.7rem}

  .timer-bar-wrap{background:var(--card);border-radius:999px;height:6px;margin-bottom:1.2rem;overflow:hidden}
  .timer-bar{height:100%;border-radius:999px;background:var(--green);transition:width .5s linear, background .5s}
  .timer-bar.warn{background:var(--amber)}
  .timer-bar.danger{background:var(--red)}
  .timer-txt{text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:1rem}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
  .opt{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:.9rem;cursor:pointer;font-size:.95rem;text-align:center;transition:.15s;color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.35}
  .opt:hover:not(.disabled){border-color:var(--accent);background:rgba(79,156,249,.08)}
  .opt.correct{background:rgba(62,207,142,.15);border-color:var(--green);color:var(--green)}
  .opt.wrong{background:rgba(247,94,94,.15);border-color:var(--red);color:var(--red)}
  .opt.disabled{cursor:default;opacity:.7}

  .feedback{text-align:center;font-size:.9rem;font-weight:500;min-height:1.4rem;margin-top:.8rem}
  .feedback.correct{color:var(--green)}
  .feedback.wrong{color:var(--red)}
  .feedback.timeout{color:var(--amber)}

  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center}
  .result-score{font-family:'Playfair Display',serif;font-size:3.5rem;color:var(--accent)}
  .result-msg{font-size:1rem;color:var(--muted);margin:.5rem 0 1.5rem}
  .result-detail{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:1.5rem}
  .start-btn,.next-btn{background:var(--accent);color:#fff;border:none;padding:.8rem 2rem;border-radius:10px;font-size:1rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:.15s}
  .start-btn:hover,.next-btn:hover{opacity:.9;transform:scale(0.99)}

  .start-screen{text-align:center;padding:2rem 1rem}
  .start-screen h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--text);margin-bottom:.5rem}
  .start-screen p{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem;line-height:1.6}
  .cat-select{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
  .cat-btn{padding:.4rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:.2s}
  .cat-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
  .cat-btn:hover:not(.active){border-color:var(--purple);color:var(--purple)}
  .lives-display{font-size:1.2rem;letter-spacing:2px;margin-top:.5rem;color:var(--red)}
</style>

let state={
  screen:'start',level:'A1',category:'all',
  questions:[],usedIndices:[],qIndex:0,score:0,correct:0,wrong:0,skipped:0,
  globalTime:20,globalTimer:null,
  timeLeft:5,timerMax:5,timer:null,answered:false,
};

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}

function getQuestions(){
  let pool=vocab[state.level];
  if(state.category!=='all') pool=pool.filter(w=>w.type===state.category);
  if(pool.length<4) pool=vocab[state.level];
  return shuffle(pool);
}

function pickNext(){
  // unlimited loop: when all used, reshuffle
  if(state.usedIndices.length>=state.questions.length){
    state.usedIndices=[];
    state.questions=shuffle(state.questions);
  }
  let idx;
  let tries=0;
  do{
    idx=Math.floor(Math.random()*state.questions.length);
    tries++;
    if(tries>300){state.usedIndices=[];break;}
  }while(state.usedIndices.includes(idx));
  state.usedIndices.push(idx);
  state.qIndex=idx;
  return state.questions[idx];
}

function getWrongOptions(correct,pool){
  const others=pool.filter(w=>w.de!==correct.de);
  return shuffle(others).slice(0,3).map(w=>w.id);
}

function buildChoices(q){
  const pool=vocab[state.level];
  const wrongs=getWrongOptions(q,pool);
  const all=shuffle([q.id,...wrongs]);
  return all;
}

function startQuiz(){
  state.questions=getQuestions();
  state.usedIndices=[];
  state.qIndex=0;state.score=0;state.correct=0;state.wrong=0;state.skipped=0;
  state.timerMax=5;state.timeLeft=5;
  state.globalTime=1000;
  state.screen='quiz';
  render();
  startGlobalTimer();
  loadNextQuestion();
}

function startGlobalTimer(){
  clearInterval(state.globalTimer);
  state.globalTimer=setInterval(()=>{
    state.globalTime=Math.max(0,parseFloat((state.globalTime-0.1).toFixed(1)));
    updateGlobalTimerBar();
    if(state.globalTime<=0){
      clearInterval(state.globalTimer);
      clearInterval(state.timer);
      state.screen='result';render();
    }
  },100);
}

function loadNextQuestion(){
  const q=pickNext();
  state.currentQ=q;
  state.answered=false;
  state.timeLeft=state.timerMax;
  const choices=buildChoices(q);
  state._choices=choices;
  renderQuiz();
  startTimer();
}

function startTimer(){
  clearInterval(state.timer);
  state.timeLeft=state.timerMax;
  state.timer=setInterval(()=>{
    state.timeLeft=Math.max(0,state.timeLeft-0.1);
    updateTimerBar();
    if(state.timeLeft<=0){
      clearInterval(state.timer);
      if(!state.answered) handleTimeout();
    }
  },100);
}

function handleAnswer(chosen){
  if(state.answered) return;
  state.answered=true;
  clearInterval(state.timer);
  const q=state.currentQ;
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>o.classList.add('disabled'));
  const fb=document.getElementById('feedback');
  if(chosen===q.id){
    state.correct++;state.score++;
    state.globalTime=parseFloat((state.globalTime+1).toFixed(1));
    state.timerMax=Math.min(state.timerMax+1,10);
    opts.forEach(o=>{if(o.dataset.val===chosen) o.classList.add('correct')});
    fb.textContent='✓ Benar! +1 detik bonus';fb.className='feedback correct';
  } else {
    state.wrong++;
    state.globalTime=Math.max(0,parseFloat((state.globalTime-1).toFixed(1)));
    if(state.timerMax>1) state.timerMax=Math.max(1,state.timerMax-1);
    opts.forEach(o=>{
      if(o.dataset.val===chosen) o.classList.add('wrong');
      if(o.dataset.val===q.id) o.classList.add('correct');
    });
    fb.textContent='✗ Salah! -1 detik. Jawaban: '+q.id;fb.className='feedback wrong';
  }
  updateGlobalTimerBar();
  setTimeout(()=>{ if(state.globalTime>0) loadNextQuestion(); },1300);
}

function handleTimeout(){
  state.skipped++;
  state.globalTime=Math.max(0,parseFloat((state.globalTime-1).toFixed(1)));
  if(state.timerMax>1) state.timerMax=Math.max(1,state.timerMax-1);
  const fb=document.getElementById('feedback');
  if(fb){fb.textContent='⏱ Waktu soal habis! -1 detik';fb.className='feedback timeout';}
  const q=state.currentQ;
  document.querySelectorAll('.opt').forEach(o=>{
    o.classList.add('disabled');
    if(o.dataset.val===q.id) o.classList.add('correct');
  });
  updateGlobalTimerBar();
  setTimeout(()=>{ if(state.globalTime>0) loadNextQuestion(); },1300);
}

function updateGlobalTimerBar(){
  const bar=document.getElementById('global-timer-bar');
  const txt=document.getElementById('global-timer-txt');
  if(!bar) return;
  const maxG=1000;
  const pct=Math.min(100,(state.globalTime/maxG)*100);
  bar.style.width=pct+'%';
  bar.className='timer-bar'+(pct<20?' danger':pct<40?' warn':'');
  if(txt) txt.textContent='⏳ Sisa waktu: '+state.globalTime.toFixed(1)+'s';
}

function updateTimerBar(){
  const bar=document.getElementById('timer-bar');
  const txt=document.getElementById('timer-txt');
  if(!bar) return;
  const pct=(state.timeLeft/state.timerMax)*100;
  bar.style.width=pct+'%';
  bar.className='timer-bar'+(pct<30?' danger':pct<55?' warn':'');
  if(txt) txt.textContent=state.timeLeft.toFixed(1)+' detik (max '+state.timerMax.toFixed(0)+'s)';
}

    <div class="level-tabs">
      ${['A1','A2','B1','B2'].map(l=>`<button class="tab${state.level===l?' active':''}" onclick="state.level='${l}';render()">${l}</button>`).join('')}

}

  const q=state.currentQ||state.questions[0];
  const choices=state._choices||buildChoices(q);
  state._choices=choices;
  const el=document.getElementById('main');
  if(!el) return;
  const totalAnswered=state.correct+state.wrong+state.skipped;
  el.innerHTML=`
    <div class="timer-bar-wrap" style="margin-bottom:.4rem">
      <div class="timer-bar" id="global-timer-bar" style="width:100%"></div>
    </div>
    <div class="timer-txt" id="global-timer-txt" style="margin-bottom:.8rem;font-size:.85rem;color:var(--amber)">⏳ Sisa waktu: ${state.globalTime.toFixed(1)}s</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val">${totalAnswered}</div><div class="stat-label">Dijawab</div></div>
      <div class="stat"><div class="stat-val green">${state.correct}</div><div class="stat-label">Benar</div></div>
      <div class="stat"><div class="stat-val red">${state.wrong}</div><div class="stat-label">Salah</div></div>
      <div class="stat"><div class="stat-val amber">${state.timerMax.toFixed(0)}s</div><div class="stat-label">Batas Soal</div></div>
    </div>
    <div class="quiz-card">
      <div class="question-meta">
        <span class="badge ${q.type}">${q.type.replace('-',' ')}</span>
        <span class="q-num">Level ${q.level}</span>
      </div>
      <div class="question">Artinya:<br><span class="german">${q.de}</span></div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
      <div class="timer-txt" id="timer-txt">${state.timerMax.toFixed(0)} detik</div>
      <div class="options">
        ${choices.map(c=>`<button class="opt" data-val="${c}" onclick="handleAnswer('${c.replace(/'/g,"\\'")}')"><b>${c}</b></button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>`;
  updateGlobalTimerBar();
}

function renderResult(){
  const total=state.correct+state.wrong+state.skipped;
  const pct=total>0?Math.round((state.correct/total)*100):0;
  let msg='';
  if(pct>=90) msg='Luar biasa! Kamu menguasai level ini dengan sangat baik!';
  else if(pct>=70) msg='Bagus! Terus berlatih untuk hasil lebih baik.';
  else if(pct>=50) msg='Cukup baik. Pelajari lagi kosakata yang salah ya.';
  else msg='Jangan menyerah! Ulangi dan kamu pasti bisa!';
  return `<div class="result-card">
    <div style="font-size:.9rem;color:var(--muted);margin-bottom:.3rem">Waktu Habis — Skor Akhir</div>
    <div class="result-score">${state.correct}<span style="font-size:1.5rem;color:var(--muted)">/${total}</span></div>
    <div style="font-size:.85rem;color:var(--amber);margin-bottom:.4rem">Akurasi: ${pct}%</div>
    <div class="result-msg">${msg}</div>
    <div class="result-detail">
      <div class="stat"><div class="stat-val green">${state.correct}</div><div class="stat-label">Benar</div></div>
      <div class="stat"><div class="stat-val red">${state.wrong}</div><div class="stat-label">Salah</div></div>
      <div class="stat"><div class="stat-val amber">${state.skipped}</div><div class="stat-label">Timeout</div></div>
    </div>
    <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap">
      <button class="start-btn" onclick="startQuiz()">Ulangi Level ${state.level}</button>
      <button class="start-btn" style="background:var(--surface);border:1.5px solid var(--border);color:var(--text)" onclick="state.screen='start';render()">Ganti Level</button>
    </div>
  </div>`;
}

function render(){
  const el=document.getElementById('main');
  if(state.screen==='start') el.innerHTML=renderStart();
  else if(state.screen==='result') el.innerHTML=renderResult();
  else renderQuiz();
}

render();
</script>
